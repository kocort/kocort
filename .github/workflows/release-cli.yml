name: Reusable CLI Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload packaged binaries as workflow artifacts
        required: false
        default: true
        type: boolean
      web-artifact-name:
        description: Artifact name for the prebuilt web output
        required: false
        default: kocort-web-out
        type: string

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  build-linux:
    name: CLI ${{ matrix.os_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            os_label: linux-amd64
          - goarch: arm64
            os_label: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt web artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.web-artifact-name }}
          path: .web-dist

      - name: Prepare embedded web assets
        run: |
          mkdir -p api/static/dist
          find api/static/dist -mindepth 1 -not -name '.gitkeep' -exec rm -rf {} +
          if [ -d .web-dist/out ]; then
            cp -R .web-dist/out/. api/static/dist/
          else
            cp -R .web-dist/. api/static/dist/
          fi

      - name: Make build script executable
        run: chmod +x ./scripts/build.sh

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          kocort_SKIP_WEB: "1"
          kocort_OUTPUT: dist/linux_${{ matrix.goarch }}/kocort
        run: ./scripts/build.sh

      - name: Package artifact
        run: tar -czf kocort-${{ matrix.os_label }}.tar.gz -C dist/linux_${{ matrix.goarch }} kocort

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kocort-${{ matrix.os_label }}
          path: kocort-${{ matrix.os_label }}.tar.gz

  build-darwin:
    name: CLI ${{ matrix.os_label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            goarch: amd64
            os_label: darwin-amd64
          - runner: macos-14
            goarch: arm64
            os_label: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt web artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.web-artifact-name }}
          path: .web-dist

      - name: Prepare embedded web assets
        run: |
          mkdir -p api/static/dist
          find api/static/dist -mindepth 1 -not -name '.gitkeep' -exec rm -rf {} +
          if [ -d .web-dist/out ]; then
            cp -R .web-dist/out/. api/static/dist/
          else
            cp -R .web-dist/. api/static/dist/
          fi

      - name: Make build script executable
        run: chmod +x ./scripts/build.sh

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          kocort_SKIP_WEB: "1"
          kocort_OUTPUT: dist/darwin_${{ matrix.goarch }}/kocort
        run: ./scripts/build.sh

      - name: Package artifact
        run: tar -czf kocort-${{ matrix.os_label }}.tar.gz -C dist/darwin_${{ matrix.goarch }} kocort

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kocort-${{ matrix.os_label }}
          path: kocort-${{ matrix.os_label }}.tar.gz

  build-windows:
    name: CLI ${{ matrix.os_label }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            os_label: windows-amd64
          - goarch: arm64
            os_label: windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt web artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.web-artifact-name }}
          path: .web-dist

      - name: Prepare embedded web assets
        shell: bash
        run: |
          mkdir -p api/static/dist
          find api/static/dist -mindepth 1 -not -name '.gitkeep' -exec rm -rf {} +
          if [ -d .web-dist/out ]; then
            cp -R .web-dist/out/. api/static/dist/
          else
            cp -R .web-dist/. api/static/dist/
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          kocort_SKIP_WEB: "1"
          kocort_OUTPUT: dist/windows_${{ matrix.goarch }}/kocort.exe
        run: .\scripts\build.ps1

      - name: Package artifact
        shell: pwsh
        run: Compress-Archive -Path "dist\windows_${{ matrix.goarch }}\kocort.exe" -DestinationPath "kocort-${{ matrix.os_label }}.zip" -Force

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kocort-${{ matrix.os_label }}
          path: kocort-${{ matrix.os_label }}.zip

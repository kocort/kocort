name: Reusable Desktop Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload packaged desktop builds as workflow artifacts
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  build-desktop-windows:
    name: Desktop windows-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            action: --windows
            dist_dir: dist/windows_amd64
            artifact_name: kocort-desktop-windows-amd64
          - arch: arm64
            action: --windows-arm
            dist_dir: dist/windows_arm64
            artifact_name: kocort-desktop-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          # Install llvm-mingw for both amd64 and arm64 Windows cross-compilation
          LLVM_MINGW_VER="20250114"
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VER}/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64.tar.xz"
          curl -fsSL "$LLVM_MINGW_URL" | sudo tar -xJ -C /opt
          echo "/opt/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Build desktop bundle
        run: |
          chmod +x ./scripts/build-desktop.sh
          ./scripts/build-desktop.sh ${{ matrix.action }}

      - name: Package artifact
        run: |
          python3 - <<'PY'
          import os
          import zipfile

          dist_dir = os.path.abspath('${{ matrix.dist_dir }}')
          archive_path = os.path.abspath('${{ matrix.artifact_name }}.zip')
          with zipfile.ZipFile(archive_path, 'w', zipfile.ZIP_DEFLATED) as archive:
              for root, _, files in os.walk(dist_dir):
                  for filename in files:
                      full_path = os.path.join(root, filename)
                      archive.write(full_path, os.path.relpath(full_path, dist_dir))
          PY

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  build-desktop-macos:
    name: Desktop macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13-large
            arch: amd64
            action: --macos-amd64
            macos_version_min: "11.0"
            artifact_name: kocort-desktop-macos-amd64
          - runner: macos-14
            arch: arm64
            action: --macos-arm64
            macos_version_min: "14.0"
            artifact_name: kocort-desktop-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build desktop app
        env:
          CGO_CFLAGS: "-O3 -mmacosx-version-min=${{ matrix.macos_version_min }}"
          CGO_CXXFLAGS: "-O3 -mmacosx-version-min=${{ matrix.macos_version_min }}"
          CGO_LDFLAGS: "-mmacosx-version-min=${{ matrix.macos_version_min }}"
        run: |
          chmod +x ./scripts/build-desktop.sh
          ./scripts/build-desktop.sh ${{ matrix.action }}

      - name: Package app bundle
        run: tar -czf ${{ matrix.artifact_name }}-app.tar.gz -C dist Kocort.app

      - name: Build DMG
        run: ./scripts/build-desktop.sh --macos-dmg-only

      - name: Rename dmg artifact
        run: |
          version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          mv "dist/Kocort-${version}.dmg" ${{ matrix.artifact_name }}.dmg

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}-app.tar.gz
            ${{ matrix.artifact_name }}.dmg

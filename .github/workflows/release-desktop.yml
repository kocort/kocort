name: Reusable Desktop Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload packaged desktop builds as workflow artifacts
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  build-desktop-windows:
    name: Desktop windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            action: --windows
            dist_dir: dist/windows_amd64
            artifact_name: kocort-desktop-windows-amd64
          - arch: arm64
            action: --windows-arm
            dist_dir: dist/windows_arm64
            artifact_name: kocort-desktop-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Install rg/fd
        shell: pwsh
        run: choco install -y --no-progress ripgrep fd

      - name: Install LLVM MinGW
        shell: bash
        run: |
          LLVM_MINGW_VER="llvm-mingw-20250114-ucrt-x86_64"
          curl -fsSL \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/${LLVM_MINGW_VER}.zip" \
            -o llvm-mingw.zip
          unzip -q llvm-mingw.zip -d /c/
          echo "C:/${LLVM_MINGW_VER}/bin" >> "$GITHUB_PATH"

      - name: Build desktop bundle
        shell: bash
        run: |
          chmod +x ./scripts/build-desktop.sh
          ./scripts/build-desktop.sh ${{ matrix.action }} --with-browser

      - name: Package artifact
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.dist_dir }}\*" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  build-desktop-macos:
    name: Desktop macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
            action: --macos-amd64
            macos_version_min: "11.0"
            artifact_name: kocort-desktop-macos-amd64
          - runner: macos-14
            arch: arm64
            action: --macos-arm64
            macos_version_min: "14.0"
            artifact_name: kocort-desktop-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Install rg/fd
        run: brew install ripgrep fd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build desktop app
        env:
          CGO_CFLAGS: "-O3 -mmacosx-version-min=${{ matrix.macos_version_min }}"
          CGO_CXXFLAGS: "-O3 -mmacosx-version-min=${{ matrix.macos_version_min }}"
          CGO_LDFLAGS: "-mmacosx-version-min=${{ matrix.macos_version_min }}"
        run: |
          chmod +x ./scripts/build-desktop.sh
          ./scripts/build-desktop.sh ${{ matrix.action }} --with-browser

      - name: Build DMG
        run: ./scripts/build-desktop.sh --macos-dmg-only

      - name: Rename dmg artifact
        run: |
          version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          mv "dist/Kocort-${version}.dmg" ${{ matrix.artifact_name }}.dmg

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.dmg

name: Publish Release

on:
  workflow_dispatch:
    inputs:
      build-cli:
        description: "构建 CLI (linux/darwin/windows × amd64/arm64)"
        type: boolean
        default: true
      build-desktop:
        description: "构建 Desktop (6 平台, win/linux amd64 含 Vulkan GPU)"
        type: boolean
        default: true
      create-release:
        description: "创建 GitHub Release (基于最新 tag)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  web:
    name: Build Web Artifact
    if: inputs.build-cli || inputs.build-desktop
    uses: ./.github/workflows/release-web.yml
    with:
      upload-artifacts: true
      artifact-name: kocort-web-out

  cli:
    name: Build CLI Artifacts
    if: inputs.build-cli
    needs: web
    uses: ./.github/workflows/release-cli.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  desktop:
    name: Build Desktop Artifacts
    if: inputs.build-desktop
    needs: web
    uses: ./.github/workflows/release-desktop.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    needs:
      - cli
      - desktop
    # Allow release when optional build groups were intentionally skipped.
    if: ${{ always() && inputs.create-release && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kocort-{cli,desktop}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' \) | sort | xargs sha256sum > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
            artifacts/SHA256SUMS

  sync-website-downloads:
    name: Sync Website Downloads
    runs-on: ubuntu-latest
    needs:
      - release
    if: ${{ needs.release.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync website downloads.js
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
          WEBSITE_PROXY_PREFIX_ZH: https://g.cource.com/
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "WEBSITE_REPO_TOKEN is not set; skipping website downloads.js sync."
            exit 0
          fi
          chmod +x ./scripts/sync-website-downloads.sh
          ./scripts/sync-website-downloads.sh "${{ needs.release.outputs.tag }}"

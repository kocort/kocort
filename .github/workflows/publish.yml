name: Publish Release

on:
  workflow_dispatch:
    inputs:
      build-cli:
        description: "构建 CLI (linux/darwin/windows × amd64/arm64)"
        type: boolean
        default: true
      build-desktop:
        description: "构建 Desktop (6 平台，无 GPU 变体)"
        type: boolean
        default: true
      create-release:
        description: "创建 GitHub Release (基于最新 tag)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  web:
    name: Build Web Artifact
    if: inputs.build-cli || inputs.build-desktop
    uses: ./.github/workflows/release-web.yml
    with:
      upload-artifacts: true
      artifact-name: kocort-web-out

  cli:
    name: Build CLI Artifacts
    if: inputs.build-cli
    needs: web
    uses: ./.github/workflows/release-cli.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  desktop:
    name: Build Desktop Artifacts
    if: inputs.build-desktop
    needs: web
    uses: ./.github/workflows/release-desktop.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - cli
      - desktop
    # Allow release when optional build groups were intentionally skipped.
    if: ${{ always() && inputs.create-release && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

      - name: Download CLI Linux artifacts
        if: inputs.build-cli
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kocort-linux-*
          merge-multiple: true

      - name: Download CLI Darwin artifacts
        if: inputs.build-cli
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kocort-darwin-*
          merge-multiple: true

      - name: Download CLI Windows artifacts
        if: inputs.build-cli
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kocort-windows-*
          merge-multiple: true

      - name: Download desktop artifacts
        if: inputs.build-desktop
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kocort-desktop-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' \) | sort | xargs sha256sum > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
            artifacts/SHA256SUMS

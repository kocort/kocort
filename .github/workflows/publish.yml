name: Publish Release

on:
  workflow_dispatch:
    inputs:
      build-cli:
        description: "Build CLI artifacts (6 platforms)"
        type: boolean
        default: true
      build-desktop-gpu:
        description: "Build optional Desktop GPU variants (windows/linux amd64 Vulkan)"
        type: boolean
        default: false
      build-desktop:
        description: "Build Desktop artifacts (macOS/Windows/Linux)"
        type: boolean
        default: true
      create-release:
        description: "Create GitHub Release from latest tag"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  web:
    name: Build Web Artifact
    if: inputs.build-cli || inputs.build-desktop || inputs.build-desktop-gpu
    uses: ./.github/workflows/release-web.yml
    with:
      upload-artifacts: true
      artifact-name: kocort-web-out

  cli:
    name: Build CLI Artifacts
    if: inputs.build-cli
    needs: web
    uses: ./.github/workflows/release-cli.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  desktop:
    name: Build Desktop Artifacts
    if: inputs.build-desktop
    needs: web
    uses: ./.github/workflows/release-desktop.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  desktop-gpu:
    name: Build Desktop GPU Artifacts
    if: inputs.build-desktop-gpu
    needs: web
    uses: ./.github/workflows/release-desktop-gpu.yml
    with:
      upload-artifacts: true
      web-artifact-name: kocort-web-out

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - cli
      - desktop
      - desktop-gpu
    # Allow release when optional build groups were intentionally skipped.
    if: ${{ always() && inputs.create-release && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f | sort | xargs sha256sum > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
